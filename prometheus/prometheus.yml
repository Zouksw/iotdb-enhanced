# Prometheus Configuration for IoTDB Enhanced
global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    cluster: 'iotdb-enhanced'
    environment: 'development'

# AlertManager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'alertmanager:9093'

# Rule files
rule_files:
  - '/etc/prometheus/alerts/*.yml'

# Scrape configurations
scrape_configs:
  # IoTDB Enhanced Backend
  - job_name: 'iotdb-enhanced-backend'
    static_configs:
      - targets: ['host.docker.internal:8000']
        labels:
          service: 'iotdb-enhanced-backend'
          app: 'iotdb-enhanced'
    scrape_interval: 30s
    scrape_timeout: 10s
    metrics_path: '/metrics'

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  # AlertManager self-monitoring
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']
        labels:
          service: 'alertmanager'

  # Grafana self-monitoring
  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']
        labels:
          service: 'grafana'
