name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        type: choice
        options:
          - development
          - staging
          - production
        default: staging

env:
  NODE_VERSION: '20.x'
  PNPM_VERSION: 9

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm modules
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies (backend)
        working-directory: ./backend
        run: pnpm install --frozen-lockfile

      - name: Install dependencies (frontend)
        working-directory: ./frontend
        run: pnpm install --frozen-lockfile

      - name: Type check backend
        working-directory: ./backend
        run: pnpm run build

      - name: Type check frontend
        working-directory: ./frontend
        run: pnpm run build

      - name: Lint backend
        working-directory: ./backend
        run: pnpm exec eslint src --ext .ts

      - name: Lint frontend
        working-directory: ./frontend
        run: pnpm run lint

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run npm audit (backend)
        working-directory: ./backend
        run: npm audit --audit-level=moderate || true

      - name: Run npm audit (frontend)
        working-directory: ./frontend
        run: npm audit --audit-level=moderate || true

      - name: Run Snyk security scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  build:
    name: Build Production
    runs-on: ubuntu-latest
    needs: [test, security]

    strategy:
      matrix:
        service: [backend, frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.service }}:latest
            ghcr.io/${{ github.repository }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: production

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'

    environment:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST || 'localhost' }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER || 'root' }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/opt/iotdb-enhanced' }}
      DEPLOY_KEY: ${{ secrets.DEPLOY_SSH_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ env.DEPLOY_KEY }}
          port: 22
          script_stop_timeout: 30m
          script: |
            # Stop existing services
            cd ${{ env.DEPLOY_PATH }}
            ./stop.sh

            # Pull latest code (if using git)
            git fetch origin main
            git reset --hard origin/main

            # Build backend
            cd backend
            npm ci --production=false
            npm run build
            cd ..

            # Build frontend
            cd frontend
            pnpm install --frozen-lockfile
            pnpm run build
            cd ..

            # Restart services
            ./start.sh

            # Health check
            sleep 10
            curl -f http://localhost:8002/health || exit 1
            curl -f http://localhost:3000 || exit 1

            echo "Deployment successful!"

      - name: Notify deployment status
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: |
            Deployment ${{ job.status }}
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deployment failed. Initiating rollback..."
          # Add rollback logic here (e.g., restore previous Docker images)
