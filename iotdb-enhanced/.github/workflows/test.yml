name: Test

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20.x'
  PNPM_VERSION: 9

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm modules
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies (backend)
        working-directory: ./backend
        run: pnpm install --frozen-lockfile

      - name: Install dependencies (frontend)
        working-directory: ./frontend
        run: pnpm install --frozen-lockfile

      - name: Lint backend
        working-directory: ./backend
        run: pnpm exec eslint src --ext .ts --max-warnings=0

      - name: Lint frontend
        working-directory: ./frontend
        run: pnpm run lint

  type-check:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm modules
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies (backend)
        working-directory: ./backend
        run: pnpm install --frozen-lockfile

      - name: Install dependencies (frontend)
        working-directory: ./frontend
        run: pnpm install --frozen-lockfile

      - name: Type check backend
        working-directory: ./backend
        run: pnpm run build

      - name: Type check frontend
        working-directory: ./frontend
        run: pnpm run build

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: iotdb_test
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: iotdb_enhanced_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://iotdb_test:test_password@localhost:5432/iotdb_enhanced_test
      JWT_SECRET: test_secret_for_ci
      NODE_ENV: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm modules
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies (backend)
        working-directory: ./backend
        run: pnpm install --frozen-lockfile

      - name: Install dependencies (frontend)
        working-directory: ./frontend
        run: pnpm install --frozen-lockfile

      - name: Setup database
        working-directory: ./backend
        run: |
          pnpm prisma migrate deploy
          pnpm prisma db seed || true

      - name: Run backend tests
        working-directory: ./backend
        run: pnpm test --ci --coverage --maxWorkers=2

      - name: Run frontend tests
        working-directory: ./frontend
        run: pnpm test --ci --coverage --maxWorkers=2

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./backend/coverage/coverage-final.json,./frontend/coverage/coverage-final.json
          flags: backend,frontend
          name: codecov-umbrella
        continue-on-error: true

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [lint, type-check]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: iotdb_test
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: iotdb_enhanced_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://iotdb_test:test_password@localhost:5432/iotdb_enhanced_test
      JWT_SECRET: test_secret_for_ci
      NODE_ENV: test
      IOTDB_HOST: localhost
      IOTDB_PORT: 6667

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm modules
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies (backend)
        working-directory: ./backend
        run: pnpm install --frozen-lockfile

      - name: Install dependencies (frontend)
        working-directory: ./frontend
        run: pnpm install --frozen-lockfile

      - name: Build backend
        working-directory: ./backend
        run: pnpm run build

      - name: Setup database
        working-directory: ./backend
        run: |
          pnpm prisma migrate deploy
          pnpm prisma db seed || true

      - name: Start backend server
        working-directory: ./backend
        run: |
          mkdir -p logs
          pnpm run start &
          echo $! > backend.pid
          # Wait for server to be ready
          for i in {1..30}; do
            if curl -f http://localhost:8002/health > /dev/null 2>&1; then
              break
            fi
            sleep 1
          done

      - name: Run integration tests
        working-directory: ./backend
        run: pnpm run test:integration

      - name: Stop backend server
        if: always()
        working-directory: ./backend
        run: |
          if [ -f backend.pid ]; then
            kill $(cat backend.pid) || true
            rm backend.pid
          fi

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [unit-tests]
    if: github.event_name == 'pull_request'

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: iotdb_test
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: iotdb_enhanced_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://iotdb_test:test_password@localhost:5432/iotdb_enhanced_test
      JWT_SECRET: test_secret_for_ci
      NODE_ENV: test
      NEXT_PUBLIC_API_URL: http://localhost:8002/api

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm modules
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies (backend)
        working-directory: ./backend
        run: pnpm install --frozen-lockfile

      - name: Install dependencies (frontend)
        working-directory: ./frontend
        run: pnpm install --frozen-lockfile

      - name: Build backend
        working-directory: ./backend
        run: pnpm run build

      - name: Build frontend
        working-directory: ./frontend
        run: pnpm run build

      - name: Setup database
        working-directory: ./backend
        run: |
          pnpm prisma migrate deploy
          pnpm prisma db seed || true

      - name: Start services
        run: |
          # Start backend
          cd backend
          mkdir -p logs
          pnpm run start &
          echo $! > ../backend.pid
          cd ..

          # Start frontend
          cd frontend
          pnpm run start &
          echo $! > ../frontend.pid
          cd ..

          # Wait for services to be ready
          for i in {1..60}; do
            if curl -f http://localhost:8002/health > /dev/null 2>&1 && \
               curl -f http://localhost:3000 > /dev/null 2>&1; then
              break
            fi
            sleep 1
          done

      - name: Install Playwright
        working-directory: ./frontend
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: ./frontend
        run: pnpm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Stop services
        if: always()
        run: |
          if [ -f backend.pid ]; then
            kill $(cat backend.pid) || true
            rm backend.pid
          fi
          if [ -f frontend.pid ]; then
            kill $(cat frontend.pid) || true
            rm frontend.pid
          fi
