version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: iotdb-postgres
    environment:
      POSTGRES_DB: iotdb_enhanced
      POSTGRES_USER: iotdb_user
      POSTGRES_PASSWORD: iotdb_password_change_me
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iotdb_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - iotdb-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: iotdb-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    networks:
      - iotdb-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: iotdb-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://iotdb_user:iotdb_password_change_me@postgres:5432/iotdb_enhanced?schema=public
      - REDIS_URL=redis://redis:6379
      - PORT=8000
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET:-change-this-secret-in-production}
      - SESSION_SECRET=${SESSION_SECRET:-change-this-secret-in-production}
      - IOTDB_HOST=${IOTDB_HOST:-host.docker.internal}
      - IOTDB_PORT=${IOTDB_PORT:-6667}
      - IOTDB_USERNAME=${IOTDB_USERNAME:-root}
      - IOTDB_PASSWORD=${IOTDB_PASSWORD:-root}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - iotdb-network

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: iotdb-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
      - NEXT_PUBLIC_IOTDB_REST_URL=http://localhost:18080
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - iotdb-network

volumes:
  postgres_data:
    driver: local

networks:
  iotdb-network:
    driver: bridge
